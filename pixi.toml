[workspace]
name = "hyf"
version = "0.1.0"
description = "Contextual intelligence for the Radroots network"
authors = ["triesap npub1tr33s4tj2le2kk9yzhfphdtss26gyn8kv7savnnjhj794nqp333q8e7grr"]
channels = [
  "https://conda.modular.com/max-nightly/",
  "conda-forge",
  "https://prefix.dev/modular-community",
]
platforms = ["osx-arm64", "linux-64"]
preview = ["pixi-build"]

[dependencies]
mojo = "=0.26.3.0.dev2026040805"
mojson = { path = "../../../../vendor/mojo/mojson" }
morph = { path = "../../../../vendor/mojo/morph" }

[tasks]
run = "mojo run src/main.mojo"
test-unit = "mojo -I src tests/test_hyf.mojo"
test-runtime = "mojo -I src tests/test_runtime_paths.mojo"
test-repo-local-process = "mojo -I src tests/test_repo_local_process_contract.mojo"
test-stdio = "mojo -I src tests/test_stdio_contract.mojo"
test-runtime-contract = { depends-on = [
  "test-runtime",
  "test-repo-local-process",
  "test-stdio",
] }
test = { depends-on = ["test-unit", "test-runtime-contract"] }
